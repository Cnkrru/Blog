        <section class="center-S">
            <!-- 主体版心设计 -->
            <div class="center-container">
                <!-- 主体部分卡片设计 -->
                <div class="center-card">
                    <!-- 中心卡片 -->
                    <!-- 主体部分卡片标题设计 -->
                    <div class="center-head-card">
                        <h2>日期工具</h2>
                        <div style="display: flex; align-items: center;">

                                <img src="../../static/img/svg/arrow-up.svg" alt="返回顶部">

                        </div>
                    </div>
                    <hr>
                    <!-- 中心卡片顶部间距区域 -->
                    <div class="center-head-blank"></div>
                    <div class="center-card-content">
                        <div class="read-center-card-body">
                            <!-- 内容区域css选择器专用套 -->
                            <div class="text-style">
                                <p>日期工具是一个基于day.js库的在线日期处理工具，支持日期格式化、计算、比较等功能。</p>
                                
                                <div class="date-tool-container">
                                    <!-- 日期格式化区域 -->
                                    <div class="tool-section">
                                        <h3>日期格式化</h3>
                                        <div class="tool-content">
                                            <div class="input-group">
                                                <label for="formatDate">日期：</label>
                                                <input type="date" id="formatDate" value="2026-04-03">
                                            </div>
                                            <div class="input-group">
                                                <label for="formatPattern">格式化模式：</label>
                                                <select id="formatPattern">
                                                    <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                                                    <option value="YYYY/MM/DD">YYYY/MM/DD</option>
                                                    <option value="YYYY年MM月DD日">YYYY年MM月DD日</option>
                                                    <option value="YYYY-MM-DD HH:mm:ss">YYYY-MM-DD HH:mm:ss</option>
                                                    <option value="YYYY年MM月DD日 HH时mm分ss秒">YYYY年MM月DD日 HH时mm分ss秒</option>
                                                    <option value="dddd, MMMM D, YYYY">dddd, MMMM D, YYYY</option>
                                                </select>
                                            </div>
                                            <button id="formatBtn" class="btn-primary">格式化</button>
                                            <div class="result-group">
                                                <label>结果：</label>
                                                <input type="text" id="formatResult" readonly>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 相对时间计算 -->
                                    <div class="tool-section">
                                        <h3>相对时间计算</h3>
                                        <div class="tool-content">
                                            <div class="input-group">
                                                <label for="relativeDate">日期：</label>
                                                <input type="date" id="relativeDate" value="2026-04-03">
                                            </div>
                                            <button id="relativeBtn" class="btn-primary">计算</button>
                                            <div class="result-group">
                                                <label>结果：</label>
                                                <input type="text" id="relativeResult" readonly>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 日期计算 -->
                                    <div class="tool-section">
                                        <h3>日期计算</h3>
                                        <div class="tool-content">
                                            <div class="input-group">
                                                <label for="calculateDate">基准日期：</label>
                                                <input type="date" id="calculateDate" value="2026-04-03">
                                            </div>
                                            <div class="input-group">
                                                <label for="calculateType">操作类型：</label>
                                                <select id="calculateType">
                                                    <option value="add">添加</option>
                                                    <option value="subtract">减去</option>
                                                </select>
                                            </div>
                                            <div class="input-group">
                                                <label for="calculateValue">数值：</label>
                                                <input type="number" id="calculateValue" value="1">
                                            </div>
                                            <div class="input-group">
                                                <label for="calculateUnit">单位：</label>
                                                <select id="calculateUnit">
                                                    <option value="day">天</option>
                                                    <option value="week">周</option>
                                                    <option value="month">月</option>
                                                    <option value="year">年</option>
                                                    <option value="hour">小时</option>
                                                    <option value="minute">分钟</option>
                                                    <option value="second">秒</option>
                                                </select>
                                            </div>
                                            <button id="calculateBtn" class="btn-primary">计算</button>
                                            <div class="result-group">
                                                <label>结果：</label>
                                                <input type="text" id="calculateResult" readonly>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 日期比较 -->
                                    <div class="tool-section">
                                        <h3>日期比较</h3>
                                        <div class="tool-content">
                                            <div class="input-group">
                                                <label for="compareDate1">日期1：</label>
                                                <input type="date" id="compareDate1" value="2026-04-03">
                                            </div>
                                            <div class="input-group">
                                                <label for="compareDate2">日期2：</label>
                                                <input type="date" id="compareDate2" value="2026-04-01">
                                            </div>
                                            <button id="compareBtn" class="btn-primary">比较</button>
                                            <div class="result-group">
                                                <label>结果：</label>
                                                <input type="text" id="compareResult" readonly>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 日期差计算 -->
                                    <div class="tool-section">
                                        <h3>日期差计算</h3>
                                        <div class="tool-content">
                                            <div class="input-group">
                                                <label for="diffDate1">开始日期：</label>
                                                <input type="date" id="diffDate1" value="2026-04-01">
                                            </div>
                                            <div class="input-group">
                                                <label for="diffDate2">结束日期：</label>
                                                <input type="date" id="diffDate2" value="2026-04-03">
                                            </div>
                                            <div class="input-group">
                                                <label for="diffUnit">单位：</label>
                                                <select id="diffUnit">
                                                    <option value="day">天</option>
                                                    <option value="week">周</option>
                                                    <option value="month">月</option>
                                                    <option value="year">年</option>
                                                    <option value="hour">小时</option>
                                                    <option value="minute">分钟</option>
                                                    <option value="second">秒</option>
                                                </select>
                                            </div>
                                            <button id="diffBtn" class="btn-primary">计算</button>
                                            <div class="result-group">
                                                <label>结果：</label>
                                                <input type="text" id="diffResult" readonly>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 当前日期时间 -->
                                    <div class="tool-section">
                                        <h3>当前日期时间</h3>
                                        <div class="tool-content">
                                            <button id="nowBtn" class="btn-primary">获取当前时间</button>
                                            <div class="result-group">
                                                <label>当前时间：</label>
                                                <input type="text" id="nowResult" readonly>
                                            </div>
                                            <div class="result-group">
                                                <label>Unix时间戳：</label>
                                                <input type="text" id="timestampResult" readonly>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <hr>
                        
                        <div class="read-center-card-footer">

                <button class="music-player-mode-btn" id="music-player-mode" title="顺序播放">🔁</button>
                <button class="music-player-control-btn prev-btn" id="music-player-prev">&#9664;</button>
                <button class="music-player-control-btn play-pause play-btn" id="music-player-play">&#9658;</button>
                <button class="music-player-control-btn next-btn" id="music-player-next">&#9654;</button>
                <button class="music-player-list-btn" id="music-player-list" title="播放列表">&#9776;</button>
            </div>
            <div class="music-player-progress">
                <span class="music-player-time current-time" id="music-player-current-time">0:00</span>
                <input type="range" class="music-player-progress-bar" id="music-player-progress" min="0" max="100" value="0">
                <span class="music-player-time total-time" id="music-player-total-time">0:00</span>
            </div>
        </div>
        <div class="music-player-right">
            <div class="music-player-volume">
                <span class="music-player-volume-icon" id="music-player-volume-icon">&#128266;</span>
                <input type="range" class="music-player-volume-bar" id="music-player-volume" min="0" max="100" value="70">
            </div>
        </div>
    </div>
    
    <!-- 音乐列表面板 -->
    <div class="music-list-overlay" id="music-list-overlay">
        <div class="music-list-modal">
            <div class="music-list-header">
                <h3 id="music-list-title">播放列表 (0首)</h3>
                <button class="music-player-close" id="music-list-close">&times;</button>
