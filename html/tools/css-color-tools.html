    <!-- 页眉启用flex -->

        <!-- 页眉面积分配 -->

            <!-- 页眉部分版心设计 -->
            <nav class="header-container">
                <!-- 页眉卡片设计 -->
                <div class="header-card">

                    <div class="logo-card">
                        <a href="../../index.html"><h1>Cnkrru</h1></a>

                        <button><img src="../../static/img/svg/search.svg" alt="搜索"></button>
                    </div>
                    <!-- 功能按钮模块区域设计 -->
                    <div class="button-class-card">
                        <div class="button-style theme-toggle-btn"><img src="../../static/img/svg/theme-toggle.svg" alt="切换主题"></div>
                        <div class="button-style immersive-reading-btn"><img src="../../static/img/svg/book.svg" alt="沉浸式阅读"></div>

                    </div>

    <!-- 页眉与主体间空白区域 -->
    <div class="header-blank"></div>
    <!--==============================页面中间部分==============================-->
    <!-- 页面中间部分启用flex布局 -->
    <main class="mid-flex">
        <!-- 左侧空白区域 -->
        <div class="left-blank"></div>
        <!-- ==========左侧侧边栏设计========== -->
        <!-- 左侧边栏面积分配 -->
        <aside class="left-asider-S">
            <!-- 左侧边栏版心设计 -->
            <div class="left-asider-container">
                <!-- 左侧边栏总体卡片布局 -->
                <div class="left-asider-card">
                    <!-- 头像设计 -->
                    <div class="avator-card">
                        <img src="../../static/img/avator.jpg" alt="Cnkrru的头�?>
                    </div>
                    <!-- 欢迎语设计 -->
                    <div class="welcome-saying-card">
                        <p>欢迎来到我的博客</p>
                    </div>
                    <!-- 社媒友链卡片设计 -->
                    <div class="social-links-card">
                        <ul>
                            <li><a href="https://space.bilibili.com/452778044?spm_id_from=333.1007.0.0"><img src="../../static/img/svg/bilibili.png" alt="Bilibili"></a></li>
                            <li><a href="https://github.com/Cnkrru"><img src="../../static/img/svg/github.png" alt="GitHub"></a></li>
                        </ul>
                    </div>
                    <!-- 页面跳转链接设计 -->
                    <div class="page-index-list">
                        <div class="page-index-list-inner">
                            <ul>
                                <li class="page-card"><a href="../../index.html">首页</a></li>
                                <li class="page-card"><a href="../indexs/about.html">关于</a></li>
                                <li class="page-card"><a href="../indexs/archives-index.html">归档</a></li>
                                <li class="page-card"><a href="../indexs/links-index.html">友链</a></li>
                                <li class="page-card"><a href="../indexs/tools-index.html">工具</a></li>
                                <!-- <li class="page-card"><a href="../indexs/video-index.html">视频</a></li> -->
                                <li class="page-card"><a href="../indexs/projects-index.html">项目</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        <!-- 左侧边栏与主体部分的间距区域 -->
        <div class="left-center-blank"></div>
        <!-- ==========主体区域设计========== -->
        <!-- 主体面积分配 -->
        <section class="center-S">
            <!-- 主体版心设计 -->
            <div class="center-container">
                <!-- 主体部分卡片设计 -->
                <div class="center-card">
                    <!-- 中心卡片 -->
                    <!-- 主体部分卡片标题设计 -->
                    <div class="center-head-card">
                        <h2>CSS 颜色工具</h2>
                    </div>
                    <hr>
                    <!-- 中心卡片顶部间距区域 -->
                    <div class="center-head-blank"></div>
                    <div class="center-card-content tool-content">
                        <!-- 工具容器 -->
                        <div class="color-tools-container">
                            <!-- RGBA调色工具 -->
                            <div class="color-tool-card">
                                <h3>RGBA 调色</h3>
                                <div class="rgba-tool-container">
                                    <!-- 颜色预览区域 -->
                                    <div class="color-preview-section">
                                        <div class="color-preview-box" id="colorPreviewBox"></div>
                                        <div class="color-value-display">
                                            <div class="color-value-item">
                                                <span class="color-value-label">RGBA:</span>
                                                <code class="color-value-code" id="rgbaValue">rgba(255, 0, 0, 1)</code>
                                                <button class="copy-btn" data-target="rgbaValue">复制</button>
                                            </div>
                                            <div class="color-value-item">
                                                <span class="color-value-label">HEX:</span>
                                                <code class="color-value-code" id="hexValue">#ff0000</code>
                                                <button class="copy-btn" data-target="hexValue">复制</button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 颜色调节区域 -->
                                    <div class="color-control-section">
                                        <!-- 色相选择 -->
                                        <div class="control-group">
                                            <label class="control-label">
                                                <span>色相 (Hue)</span>
                                                <span class="control-value" id="hueValue">0°</span>
                                            </label>
                                            <div class="hue-slider-container">
                                                <input type="range" class="hue-slider" id="hueSlider" min="0" max="360" value="0">
                                                <div class="hue-gradient"></div>
                                            </div>
                                        </div>
                                        
                                        <!-- 饱和度选择 -->
                                        <div class="control-group">
                                            <label class="control-label">
                                                <span>饱和度选择(Saturation)</span>
                                                <span class="control-value" id="saturationValue">100%</span>
                                            </label>
                                            <input type="range" class="control-slider saturation-slider" id="saturationSlider" min="0" max="100" value="100">
                                        </div>
                                        
                                        <!-- 亮度选择 -->
                                        <div class="control-group">
                                            <label class="control-label">
                                                <span>亮度 (Lightness)</span>
                                                <span class="control-value" id="lightnessValue">50%</span>
                                            </label>
                                            <input type="range" class="control-slider lightness-slider" id="lightnessSlider" min="0" max="100" value="50">
                                        </div>
                                        
                                        <!-- 透明度选择 -->
                                        <div class="control-group">
                                            <label class="control-label">
                                                <span>透明度选择(Alpha)</span>
                                                <span class="control-value" id="alphaValue">1</span>
                                            </label>
                                            <input type="number" class="alpha-input" id="alphaInput" min="0" max="1" step="0.01" value="1">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 渐变生成器工具 -->
                            <div class="color-tool-card">
                                <h3>渐变生成器</h3>
                                <div class="gradient-generator-container">
                                    <!-- 渐变预览区域 -->
                                    <div class="gradient-preview-section">
                                        <div class="gradient-preview-box" id="gradientPreviewBox"></div>
                                        <div class="gradient-value-display">
                                            <div class="gradient-value-item">
                                                <span class="gradient-value-label">CSS 渐变:</span>
                                                <code class="gradient-value-code" id="gradientValue">linear-gradient(90deg, #ff0000, #00ff00)</code>
                                                <button class="copy-btn" data-target="gradientValue">复制</button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- 渐变控制区域 -->
                                    <div class="gradient-control-section">
                                        <!-- 渐变类型选择 -->
                                        <div class="control-group">
                                            <label class="control-label">
                                                <span>渐变类型</span>
                                            </label>
                                            <select class="control-select" id="gradientType">
                                                <option value="linear">线性渐变</option>
                                                <option value="radial">径向渐变</option>
                                            </select>
                                        </div>
                                        
                                        <!-- 线性渐变方向选择 -->
                                        <div class="control-group linear-only">
                                            <label class="control-label">
                                                <span>渐变方向</span>
                                                <span class="control-value" id="gradientDirectionValue">90°</span>
                                            </label>
                                            <input type="range" class="control-slider" id="gradientDirectionSlider" min="0" max="360" value="90">
                                        </div>
                                        
                                        <!-- 颜色节点区域 -->
                                        <div class="color-stops-section">
                                            <div class="section-header">
                                                <h4>颜色节点</h4>
                                                <button class="add-color-stop-btn" id="addColorStopBtn">添加颜色节点</button>
                                            </div>
                                            <div class="color-stops-container" id="colorStopsContainer">
                                                <!-- 颜色节点将通过JS生成 -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 中心卡片底部间距区域 -->
                    <div class="center-foot-blank"></div>
                    <hr>
                </div>
            </div>
        </div>
        <div class="right-blank"></div>
    </main>

                    <div class="footer-element-card copyright"></div>

</body>
