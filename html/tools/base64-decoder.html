<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 基础SEO -->
    <title>Base64解码工具 | Cnkrru的博客</title>
    <meta name="description" content="Base64编码解码工具，支持文字和媒体文件的Base64转换功能">
    <meta name="keywords" content="Base64,解码,编码,工具">
    <meta name="author" content="Cnkrru">
    <meta name="robots" content="index, follow">
    
    <!-- favicon图标 -->
    <link rel="icon" href="../../favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="../../favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="../../css/public-css/public.css">
    <link rel="stylesheet" href="../../css/center-css/pages-css/member-css/post.css">
    <link rel="stylesheet" href="../../css/header-css/theme-toggle.css">
    <link rel="stylesheet" href="../../css/header-css/immersive-reading.css">
    <link rel="stylesheet" href="../../css/center-css/back-to-top.css">
    <link rel="stylesheet" href="../../css/center-css/tools-css/tool-common.css">
    <link rel="stylesheet" href="../../css/center-css/tools-css/base64-decoder.css">
</head>
<body>
    <!-- 移动端菜单遮罩层 -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>  
    <!--==============================页面头部部分==============================-->
    <!-- 页眉启用flex -->
    <header class="header-flex">
        <!-- 页眉面积分配 -->
        <div class="header-S">
            <!-- 页眉部分版心设计 -->
            <nav class="header-container">
                <!-- 页眉卡片设计 -->
                <div class="header-card">
                    <!-- Logo设计 -->
                    <div class="logo-card">
                        <a href="../../index.html"><h1>Cnkrru</h1></a>
                    </div>
                    <!-- 搜索框设计 -->
                    <div class="search-card">
                        <input type="text" placeholder="搜索">
                        <button><img src="../../static/img/svg/search.svg" alt="搜索"></button>
                    </div>
                    <!-- 功能按钮模块区域设计 -->
                    <div class="button-class-card">
                        <!-- 移动端菜单按钮 -->
                        <div class="button-style mobile-menu-toggle" id="mobile-menu-toggle">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <div class="button-style theme-toggle-btn"><img src="../../static/img/svg/theme-toggle.svg" alt="切换主题"></div>
                        <div class="button-style immersive-reading-btn"><img src="../../static/img/svg/book.svg" alt="沉浸式阅读"></div>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    <!--==============================页面中间部分==============================-->
    <!-- 页面中间部分启用flex布局 -->
    <main class="mid-flex">
        <!-- ==========左侧侧边栏设计========== -->
        <!-- 左侧边栏面积分配 -->
        <aside class="left-asider-S">
            <!-- 左侧边栏版心设计 -->
            <div class="left-asider-container">
                <!-- 左侧边栏总体卡片布局 -->
                <div class="left-asider-card">
                    <!-- 头像设计 -->
                    <div class="avator-card">
                        <img src="../../static/img/avator.jpg" alt="Cnkrru的头像">
                    </div>
                    <!-- 欢迎语设计 -->
                    <div class="welcome-saying-card">
                        <p>欢迎来到我的博客</p>
                    </div>
                    <!-- 社媒友链卡片设计 -->
                    <div class="social-links-card">
                        <ul>
                            <li><a href="https://space.bilibili.com/452778044?spm_id_from=333.1007.0.0"><img src="../../static/img/svg/bilibili.png" alt="Bilibili"></a></li>
                            <li><a href="https://github.com/Cnkrru"><img src="../../static/img/svg/github.png" alt="GitHub"></a></li>
                        </ul>
                    </div>
                    <!-- 页面跳转链接设计 -->
                    <div class="page-index-list">
                        <div class="page-index-list-inner">
                            <ul>
                                <li class="page-card"><a href="../../index.html">首页</a></li>
                                <li class="page-card"><a href="../indexs/about.html">关于</a></li>
                                <li class="page-card"><a href="../indexs/archives-index.html">归档</a></li>
                                <li class="page-card"><a href="../indexs/links-index.html">友链</a></li>
                                <li class="page-card"><a href="../indexs/tools-index.html">工具</a></li>
                                <li class="page-card"><a href="../indexs/projects-index.html">项目</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        <!-- ==========主体区域设计========== -->
        <!-- 主体面积分配 -->
        <section class="center-S">
            <!-- 主体版心设计 -->
            <div class="center-container">
                <!-- 主体部分卡片设计 -->
                <div class="center-card">
                    <!-- 中心卡片 -->
                    <!-- 主体部分卡片标题设计 -->
                    <div class="center-head-card">
                        <h2>Base64 解码工具</h2>
                    </div>
                    <hr>
                    <div class="center-card-content tool-content">
                        <!-- Base64解码工具容器 -->
                        <div class="base64-decoder-container">
                            <!-- 操作选择 -->
                            <div class="operation-selector">
                                <button class="operation-btn active" data-operation="decode">解码</button>
                                <button class="operation-btn" data-operation="encode">编码</button>
                            </div>
                            
                            <!-- 模式选择 -->
                            <div class="mode-selector">
                                <button class="mode-btn active" data-mode="text">文字模式</button>
                                <button class="mode-btn" data-mode="media">媒体模式</button>
                            </div>
                            
                            <!-- 输入区域 -->
                            <div class="input-section">
                                <label class="input-label">输入内容:</label>
                                <textarea class="input-textarea" id="inputText" placeholder="请输入要解码的Base64字符..."></textarea>
                                <div class="file-upload-section">
                                    <label class="file-upload-label">或上传文件</label>
                                    <input type="file" class="file-upload-input" id="fileInput" accept="image/*,video/*">
                                    <div class="file-info" id="fileInfo"></div>
                                </div>
                            </div>
                            
                            <!-- 控制按钮 -->
                            <div class="control-buttons">
                                <button class="action-btn" id="actionButton">解码</button>
                                <button class="clear-btn" id="clearButton">清空</button>
                            </div>
                            
                            <!-- 输出区域 -->
                            <div class="output-section">
                                <label class="output-label">输出结果:</label>
                                <textarea class="output-textarea" id="outputText" readonly placeholder="解码结果将显示在这里..."></textarea>
                                <button class="copy-btn" id="copyButton">复制结果</button>
                            </div>
                            
                            <!-- 结果状态 -->
                            <div class="result-status" id="resultStatus"></div>
                        </div>
                    </div>
                    <hr>
                </div>
            </div>
        </section>
    </main>
        <!--==============================页脚区域==============================-->
    <!-- 页脚启用felx布局 -->
    <footer class="footer-flex">
        <div class="footer-S">
            <nav class="footer-container">
                <div class="footer-card">
                    <div class="footer-element-card website-age"></div>
                    <div class="footer-element-card article-count"></div>
                    <div class="footer-element-card copyright"></div>
                </div>
            </nav>
        </div>
    </footer>
    <div class="footer-blank"></div>
    <script src="../../js/header-js/theme-toggle.js"></script>
    <script src="../../js/header-js/immersive-reading.js"></script>
    <script src="../../js/header-js/back-to-top.js"></script>
    <script src="../../js/tools-js/base64-decoder.js"></script>
    <script src="../../js/header-js/search.js"></script>
    <script src="../../js/footer-js/website-age.js"></script>
    <script src="../../js/footer-js/article-count.js"></script>
    <script src="../../js/footer-js/copyright.js"></script>
    <!-- 移动端菜单脚本 -->
    <script src="../../js/mobile-menu.js"></script>
</body>
</html>
