  <!-- 标题 -->
  <text x="60" y="150" font-size="42" font-weight="bold" fill="#ffffff">Frontend-HTML-CSS组</text><text x="60" y="200" font-size="36" font-weight="bold" fill="#ffffff">件</text>

  <!-- 标签 -->
  <foreignObject x="56" y="270" width="1088" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;">
      <span style="display:inline-block;padding:6px 14px;border-radius:20px;border:1.5px solid #ff99bb;color:#ff99bb;font-size:14px;margin-right:8px;margin-bottom:8px;">前端</span><span style="display:inline-block;padding:6px 14px;border-radius:20px;border:1.5px solid #ff99bb;color:#ff99bb;font-size:14px;margin-right:8px;margin-bottom:8px;">组件</span>
    </div>
  </foreignObject>

  <!-- 底部信息 -->
  <text x="60" y="570" font-size="20" fill="rgba(255,255,255,0.5)">Cnkrru's Blog</text>
